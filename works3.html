        <article class="project-description">
            <p>現代人幾乎都有每天早上一杯咖啡的習慣。原本喝咖啡是為了提神，但當這個行為變成每天固定的日常後，它逐漸演變成一種習慣、一種儀式感，甚至是一種心理上的安全感。</p>
              <p>人物不斷喝著手中的咖啡，而每當咖啡被喝掉後，鏡頭外都會伸出一隻手再次將咖啡倒滿。仔細觀察會發現，每隻手的裝扮都與所在場景有某種關聯。透過不斷被補滿、永遠不會減少的咖啡，呈現日常生活中人們對習慣的依賴。</p>
        </article>
